<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crypto Timeline Register</title>
    <meta
      name="description"
      content="Crypto Timeline Register is a shared Twitter attendance ledger with one handle, one roll number, and visible local timestamps."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-grid">
      <header class="topbar">
        <a class="brand" href="https://x.com/shubhamtotu" target="_blank" rel="noreferrer noopener"
          >For Twitter</a
        >
        <a class="top-cta" href="#directory">View Register</a>
      </header>

      <main class="page-shell">
        <section class="hero">
          <div class="hero-avatars" aria-hidden="true">
            <span class="avatar-chip avatar-photo">
              <img src="./avatar-shubham.jpg" alt="" />
            </span>
            <span class="avatar-chip alt">@X</span>
          </div>

          <p class="availability"><span class="availability-dot"></span> Mark your attendance</p>

          <h1>
            Crypto Timeline
            <span>Register</span>
          </h1>

          <p class="hero-copy">One handle, one roll number.</p>

          <p class="hero-meta">
            <span id="current-day">Wednesday</span>,
            <span id="current-date">March 11, 2026</span>,
            <span id="current-time">9:47:00 PM IST</span>
          </p>

          <form class="composer-form" id="attendance-form">
            <div class="composer-bar" id="composer">
              <label class="sr-only" for="attendance-status">Attendance status</label>
              <select id="attendance-status" name="attendance-status" required>
                <option value="">Status</option>
                <option value="present">Present</option>
                <option value="retarded">Retarded</option>
              </select>

              <label class="sr-only" for="twitter-handle">Twitter username</label>
              <input
                id="twitter-handle"
                name="twitter-handle"
                type="text"
                inputmode="text"
                autocomplete="off"
                placeholder="@yourhandle"
                maxlength="16"
                required
              />

              <button class="submit-button" type="submit">Mark attendance</button>
            </div>
          </form>

          <p class="helper-text">Select a status, then sign your Twitter handle.</p>
          <p class="form-status" id="form-status" aria-live="polite"></p>
        </section>

        <section class="directory-panel" id="directory">
          <div class="directory-header">
            <div>
              <p class="panel-label">Attendance ledger</p>
              <h2>Register</h2>
            </div>
            <div class="directory-summary">
              <strong id="attendance-count">0 rolls</strong>
              <span>Shared for every visitor</span>
            </div>
          </div>

          <ol class="directory-list" id="roll-list" aria-live="polite"></ol>
        </section>
        <div class="footer-trigger" id="footer-trigger" aria-hidden="true"></div>
      </main>
    </div>

    <p class="page-credit" id="page-credit">made by <a href="https://x.com/shubhamtotu">@shubhamtotu</a></p>

    <template id="empty-state-template">
      <li class="directory-empty">
        <p>No rolls yet.</p>
        <span>The register opens after the first signature.</span>
      </li>
    </template>

    <script src="./supabase-config.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
